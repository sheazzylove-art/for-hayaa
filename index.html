<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Beautiful Haya ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at top,#ffe6f0,#fff0f5,#ffd6e8);
overflow:hidden;
}

/* Floating Hearts */
.heart{
position:absolute;
color:#ff4d88;
animation:float 8s linear infinite;
font-size:20px;
opacity:0.6;
}
@keyframes float{
0%{transform:translateY(100vh) scale(0.5);}
100%{transform:translateY(-10vh) scale(1.2);}
}

.container{
width:95%;
max-width:420px;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 20px 50px rgba(255,0,90,0.2);
text-align:center;
position:relative;
z-index:10;
animation:fadeIn 1.5s ease-in-out;
}

h1{
font-family:'Great Vibes',cursive;
font-size:38px;
color:#ff2e63;
margin-bottom:10px;
}

.question{
margin:20px 0;
font-size:18px;
min-height:60px;
color:#444;
}

button{
padding:12px;
margin:6px;
border:none;
border-radius:30px;
background:#ff4d79;
color:white;
cursor:pointer;
transition:0.3s;
font-size:14px;
}

button:hover{
transform:scale(1.1);
background:#ff2e63;
}

#noBtn{
position:relative;
}

.compliment{
margin-top:15px;
color:#ff2e63;
font-weight:500;
min-height:50px;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="romantic.mp3" type="audio/mpeg">
</audio>

<div class="container">
<h1>Haya 💖</h1>
<div class="question" id="question"></div>
<div id="answers"></div>
<div class="compliment" id="compliment"></div>
</div>

<script>
// Music play on first tap (iPhone friendly)
document.body.addEventListener("click",()=>{
document.getElementById("bgMusic").play();
},{once:true});

// Floating hearts generator
setInterval(()=>{
let heart=document.createElement("div");
heart.innerHTML="❤";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*20)+"px";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},8000);
},500);

// Questions
const questions=[
"Which memory of us makes you smile the most?",
"What makes our love different from others?",
"If I hug you right now, what would you do?",
"What melts your heart instantly?",
"Do you love me? ❤️"
];

const compliments=[
"Your eyes sparkle brighter than every star in the sky.",
"Your hair flows like poetry in motion.",
"Your lips are softer than every love song ever written.",
"Your smile is my favorite sunrise.",
"That blush on your face makes you the most beautiful woman alive."
];

let current=0;

function loadQuestion(){
document.getElementById("compliment").innerText="";
document.getElementById("question").innerText=questions[current];
const ansDiv=document.getElementById("answers");
ansDiv.innerHTML="";

if(current===4){
let yesBtn=document.createElement("button");
yesBtn.innerText="Yes 💖";
yesBtn.onclick=()=>{
document.getElementById("compliment").innerText=compliments[current];
launchConfetti();
};

let noBtn=document.createElement("button");
noBtn.innerText="No 🙈";
noBtn.id="noBtn";

noBtn.onmouseover=()=>{
noBtn.style.position="absolute";
noBtn.style.top=Math.random()*200+"px";
noBtn.style.left=Math.random()*200+"px";
};

ansDiv.appendChild(yesBtn);
ansDiv.appendChild(noBtn);
}else{
["Forever","Always","Only you"].forEach(text=>{
let btn=document.createElement("button");
btn.innerText=text;
btn.onclick=()=>{
document.getElementById("compliment").innerText=compliments[current];
setTimeout(()=>{
current++;
if(current<questions.length) loadQuestion();
},1500);
};
ansDiv.appendChild(btn);
});
}
}

function launchConfetti(){
for(let i=0;i<100;i++){
let conf=document.createElement("div");
conf.innerHTML="✨";
conf.style.position="absolute";
conf.style.left=Math.random()*100+"vw";
conf.style.top=Math.random()*100+"vh";
conf.style.fontSize="20px";
document.body.appendChild(conf);
setTimeout(()=>conf.remove(),2000);
}
}

loadQuestion();
</script>

</body>
</html>
